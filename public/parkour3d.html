<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>3D Parkour Platformer</title>
  <style>
    body { 
      margin: 0;
      overflow: hidden;
      background-color: #1a202c;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    canvas { 
      display: block; 
    }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 8px;
      font-size: 24px;
      display: none; /* Hidden by default */
    }
    #gameOver {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      background: rgba(0, 0, 0, 0.7);
      padding: 40px;
      border-radius: 16px;
      display: none;
      border: 1px solid #4a5568;
    }
    #gameOver h1 {
      font-size: 48px;
      margin: 0 0 10px 0;
      color: #e53e3e;
    }
    #gameOver p {
      font-size: 24px;
      margin-bottom: 20px;
    }
    #restartButton {
      padding: 12px 24px;
      font-size: 20px;
      cursor: pointer;
      background-color: #4299e1;
      color: white;
      border: none;
      border-radius: 8px;
      transition: background-color 0.3s;
    }
    #restartButton:hover {
      background-color: #3182ce;
    }
    #startScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #1a202c;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    #startScreen img {
      width: 150px;
      margin-bottom: 40px;
    }
    #startButton {
      padding: 15px 30px;
      font-size: 22px;
      cursor: pointer;
      background-color: #4299e1;
      color: white;
      border: none;
      border-radius: 8px;
      transition: background-color 0.3s, transform 0.2s;
    }
    #startButton:hover {
      background-color: #3182ce;
      transform: scale(1.05);
    }
  </style>

<body>
  <div id="startScreen">
    <img src="https://i.imgur.com/sE4bQ2G.png" alt="Fusion Core Logo">
    <button id="startButton">Start Game</button>
  </div>
  <div id="info">Score: <span id="score">0</span></div>
  <div id="gameOver">
    <h1>Game Over</h1>
    <p>Your final score: <span id="finalScore">0</span></p>
    <button id="restartButton">Restart</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    let scene, camera, renderer, player, platforms, keys = {};
    let score = 0;
    let gameOver = false;
    let playerVelocity = new THREE.Vector3();
    let onPlatform = false;
    const gravity = new THREE.Vector3(0, -0.02, 0);
    const jumpForce = 0.5;
    let lastPlatformZ = 0;
    let difficulty = 0;

    function init() {
      // Scene
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x1a202c);
      scene.fog = new THREE.Fog(0x1a202c, 10, 50);

      // Camera
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 5, 5);
      camera.lookAt(0, 0, 0);

      // Renderer
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      // Lighting
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(5, 10, 7.5);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.width = 2048;
      dirLight.shadow.mapSize.height = 2048;
      scene.add(dirLight);

      // Player
      const playerGeometry = new THREE.BoxGeometry(1, 1, 1);
      const playerMaterial = new THREE.MeshStandardMaterial({ color: 0x4299e1 });
      player = new THREE.Mesh(playerGeometry, playerMaterial);
      player.position.y = 1.5;
      player.castShadow = true;
      scene.add(player);

      // Platforms
      platforms = new THREE.Group();
      scene.add(platforms);
      
      // Initial setup
      resetGame();

      // Event Listeners
      window.addEventListener('keydown', (e) => keys[e.code] = true);
      window.addEventListener('keyup', (e) => keys[e.code] = false);
      window.addEventListener('resize', onWindowResize);
      
      document.getElementById('startButton').addEventListener('click', () => {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('info').style.display = 'block';
        animate();
      });

      document.getElementById('restartButton').addEventListener('click', () => {
        document.getElementById('gameOver').style.display = 'none';
        resetGame();
        animate();
      });

      // Initial render to show something before game starts
      renderer.render(scene, camera);
    }

    function resetGame() {
      // Reset variables
      score = 0;
      gameOver = false;
      difficulty = 0;
      lastPlatformZ = 0;
      playerVelocity.set(0, 0, 0);
      player.position.set(0, 1.5, 0);
      document.getElementById('score').innerText = score;
      camera.position.set(0, 5, 5);
      camera.lookAt(0, 0, 0);

      // Clear old platforms
      while(platforms.children.length > 0){ 
        platforms.remove(platforms.children[0]); 
      }

      // Create starting platform
      createPlatform(0, 0, 0, 10, 1, 10);

      // Create initial platforms
      for (let i = 0; i < 10; i++) {
        generateNextPlatform();
      }
    }

    function createPlatform(x, y, z, width, height, depth) {
      const platformMaterial = new THREE.MeshStandardMaterial({ 
        color: 0x4a5568,
        transparent: false,
        opacity: 1
      });
      const platformGeometry = new THREE.BoxGeometry(width, height, depth);
      const platform = new THREE.Mesh(platformGeometry, platformMaterial);
      platform.position.set(x, y, z);
      platform.receiveShadow = true;
      platforms.add(platform);
      return platform;
    }

    function generateNextPlatform() {
        const minGap = 2 + difficulty;
        const maxGap = 4 + difficulty;
        const gap = THREE.MathUtils.randFloat(minGap, maxGap);
        
        lastPlatformZ -= gap;

        const xRange = 4 + difficulty * 0.5;
        const newX = THREE.MathUtils.randFloat(-xRange, xRange);
        
        const yRange = 1 + difficulty;
        const newY = THREE.MathUtils.randFloat(-yRange, 0);

        const minSize = 2;
        const maxSize = 5 - difficulty * 0.2;
        const newWidth = THREE.MathUtils.randFloat(minSize, Math.max(minSize, maxSize));
        const newDepth = THREE.MathUtils.randFloat(minSize, Math.max(minSize, maxSize));

        createPlatform(newX, newY, lastPlatformZ, newWidth, 1, newDepth);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function handleCollisions() {
        onPlatform = false;
        const playerBox = new THREE.Box3().setFromObject(player);

        platforms.children.forEach(platform => {
            const platformBox = new THREE.Box3().setFromObject(platform);
            const intersects = playerBox.intersectsBox(platformBox);

            if (intersects) {
                const overlap = new THREE.Box3();
                overlap.copy(playerBox).intersect(platformBox);

                const overlapSize = new THREE.Vector3();
                overlap.getSize(overlapSize);

                if (overlapSize.x < overlapSize.y && overlapSize.x < overlapSize.z) {
                    // X-axis collision
                    const sign = Math.sign(player.position.x - platform.position.x);
                    player.position.x += (overlapSize.x * sign);
                } else if (overlapSize.y < overlapSize.x && overlapSize.y < overlapSize.z) {
                    // Y-axis collision
                    const sign = Math.sign(player.position.y - platform.position.y);
                    player.position.y += (overlapSize.y * sign);
                    if (sign > 0) { // Landed on top
                        onPlatform = true;
                        playerVelocity.y = 0;
                    } else { // Hit from below
                        playerVelocity.y *= -0.5; // Bounce off
                    }
                } else {
                    // Z-axis collision (less likely with autorun, but good to have)
                    const sign = Math.sign(player.position.z - platform.position.z);
                    player.position.z += (overlapSize.z * sign);
                }
            }
        });
    }

    function update() {
      if (gameOver) return;

      // Player side movement
      const moveSpeed = 0.1;
      if (keys['KeyA'] || keys['ArrowLeft']) player.position.x -= moveSpeed;
      if (keys['KeyD'] || keys['ArrowRight']) player.position.x += moveSpeed;

      // Apply gravity if not on a platform
      if (!onPlatform) {
          playerVelocity.add(gravity);
      }
      
      // Update player position based on velocity
      player.position.add(playerVelocity);

      // Player auto-run
      player.position.z -= 0.1 + difficulty * 0.01;

      // Handle collisions
      handleCollisions();

      // Jumping
      if ((keys['Space'] || keys['KeyW'] || keys['ArrowUp']) && onPlatform) {
        playerVelocity.y = jumpForce;
        onPlatform = false; // Player is now in the air
      }
      
      // Camera follow
      camera.position.x = player.position.x;
      camera.position.y = player.position.y + 5;
      camera.position.z = player.position.z + 8;
      camera.lookAt(player.position.x, player.position.y, player.position.z);

      // Score and difficulty
      const newScore = Math.max(0, Math.floor(-player.position.z / 5));
      if (newScore > score) {
          score = newScore;
          document.getElementById('score').innerText = score;
          difficulty = Math.min(5, score / 10); // Increase difficulty, cap it
          generateNextPlatform();
      }
      
      // Remove old platforms
      if (platforms.children.length > 0 && platforms.children[0].position.z > player.position.z + 20) {
          platforms.remove(platforms.children[0]);
      }

      // Game Over condition
      if (player.position.y < -10) {
        gameOver = true;
        document.getElementById('info').style.display = 'none';
        document.getElementById('finalScore').innerText = score;
        document.getElementById('gameOver').style.display = 'block';
      }
    }

    function animate() {
      if (gameOver) return;
      requestAnimationFrame(animate);
      update();
      renderer.render(scene, camera);
    }

    init();
  </script>
</body>
</html>
